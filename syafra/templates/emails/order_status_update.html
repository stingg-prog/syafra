<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Status Update</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333;">
    <div style="max-width: 600px; margin: auto; padding: 24px; border: 1px solid #e5e7eb; background: #ffffff;">
        <h1 style="font-size: 24px; margin-bottom: 16px;">Order Status Update</h1>
        <p style="margin-bottom: 12px;">Hello {{ customer_name }},</p>
        <p style="margin-bottom: 18px;">Your order <strong>#{{ order.id }}</strong> status has been updated to <strong>{{ status|capfirst }}</strong>.</p>
        <p style="margin-bottom: 18px;">{{ status_message }}</p>
        <p style="margin-bottom: 12px;"><strong>Order Total:</strong> {{ currency }}{{ order.total_price|floatformat:2 }}</p>
        <p style="color: #6b7280; font-size: 13px;">We will keep you posted as the order progresses.</p>
    </div>
</body>
</html>
