{% extends 'base.html' %}

{% block title %}Password Reset Complete - SYAFRA{% endblock %}

{% block content %}
<section class="pt-32 pb-16 px-6 bg-black text-white">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-5xl md:text-7xl font-bold tracking-tight mb-4">PASSWORD RESET COMPLETE</h1>
        <p class="text-syafra-beige tracking-wider text-sm">Your password has been updated successfully.</p>
    </div>
</section>

<section class="py-16 px-6 bg-white min-h-screen">
    <div class="max-w-md mx-auto text-center">
        <p class="text-gray-700 mb-8">You can now log in with your new password.</p>
        <a href="{% url 'accounts:login' %}" class="inline-block bg-black text-white px-8 py-4 text-sm tracking-wider font-semibold hover:bg-gray-800 transition-colors">
            SIGN IN
        </a>
    </div>
</section>
{% endblock %}
